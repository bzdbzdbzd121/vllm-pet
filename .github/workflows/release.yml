name: release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            flags: --mac dmg zip --x64 --arm64
            artifact-glob: |
              out/*.dmg
              out/*.zip
          - os: windows-latest
            flags: --win nsis portable --x64 --arm64
            artifact-glob: |
              out/*.exe
              out/*.zip
          - os: ubuntu-latest
            flags: --linux AppImage deb --x64
            artifact-glob: |
              out/*.AppImage
              out/*.deb
          - os: ubuntu-24.04-arm
            flags: --linux AppImage deb --arm64
            artifact-glob: |
              out/*.AppImage
              out/*.deb
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Unit tests
        run: npm test

      - name: Build renderer
        run: npm run build

      - name: Package (${{ matrix.os }})
        run: npx electron-builder --publish never ${{ matrix.flags }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vllm-pet-${{ matrix.os }}
          path: ${{ matrix.artifact-glob }}
          if-no-files-found: error
