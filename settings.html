<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>vLLM Pet 设置</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        min-height: 100vh;
        background: #0e1a22;
        font-family: "PingFang SC", "Microsoft YaHei", -apple-system, sans-serif;
      }
      #settings-root {
        max-width: 420px;
        margin: 0 auto;
        padding: 18px 16px 24px;
      }
      /* 页内模式：去掉气泡定位与箭头 */
      #settings-root .pet-settings {
        position: static;
        transform: none;
        width: 100%;
        box-sizing: border-box;
      }
      #settings-root .pet-settings::after { display: none; }
    </style>
  </head>
  <body>
    <div id="settings-root"></div>
    <script type="module" src="/src/renderer/settings-main.js"></script>
  </body>
</html>
