<svg class="r-svg" viewBox="0 0 240 280" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="小V·女仆机娘">
  <ellipse class="r-shadow" cx="120" cy="238" rx="38" ry="6.5"/>
  <g class="r-hover">
    <!-- 腿：白袜 + 黑鞋 -->
    <rect x="102" y="212" width="13" height="24" rx="6" style="fill:var(--c-body)"/>
    <rect x="125" y="212" width="13" height="24" rx="6" style="fill:var(--c-body)"/>
    <ellipse cx="108" cy="237" rx="10" ry="5" style="fill:var(--c-body-shade)"/>
    <ellipse cx="132" cy="237" rx="10" ry="5" style="fill:var(--c-body-shade)"/>
    <!-- 手臂：黑色泡泡袖 + 白袖口 + 小手 -->
    <ellipse class="r-arm r-arm-left" cx="84" cy="180" rx="11" ry="10"/>
    <ellipse class="r-arm r-arm-right" cx="156" cy="180" rx="11" ry="10"/>
    <rect x="77" y="188" width="14" height="7" rx="3.5" style="fill:var(--c-body)"/>
    <rect x="149" y="188" width="14" height="7" rx="3.5" style="fill:var(--c-body)"/>
    <circle cx="84" cy="200" r="4.5" style="fill:var(--c-face)"/>
    <circle cx="156" cy="200" r="4.5" style="fill:var(--c-face)"/>
    <!-- 黑裙 -->
    <path d="M96 172 C108 166 132 166 144 172 L158 222 C132 232 108 232 82 222 Z" style="fill:var(--c-body-shade)"/>
    <!-- 裙摆白色花边 -->
    <path d="M82 222 Q90 229 97 223 Q104 230 111 224 Q117 231 124 224 Q131 230 138 223 Q146 229 153 222 L158 222 C132 232 108 232 82 222 Z"
          style="fill:var(--c-body)"/>
    <!-- 白领子 -->
    <path d="M102 166 Q120 159 138 166 L136 174 Q120 168 104 174 Z"
          style="fill:var(--c-body);stroke:var(--c-body-shade);stroke-width:2.5"/>
    <!-- 白围裙（肩带 + 褶皱下摆） -->
    <rect x="105" y="170" width="7" height="12" rx="3" style="fill:var(--c-body)"/>
    <rect x="128" y="170" width="7" height="12" rx="3" style="fill:var(--c-body)"/>
    <path class="r-body-shell" d="M100 180 Q120 174 140 180 L146 210
      Q139 218 132 211 Q126 219 120 212 Q114 219 108 211 Q101 218 94 210 Z"/>
    <!-- 围裙蝴蝶结（胸口灯钩子） -->
    <path class="r-chest" d="M120 186 L111 180 L111 192 Z M120 186 L129 180 L129 192 Z"/>
    <circle class="r-chest-hl" cx="120" cy="186" r="2"/>
    <g class="r-head">
      <!-- 脖子 -->
      <rect x="114" y="156" width="12" height="12" rx="4" style="fill:var(--c-face)"/>
      <!-- 后脑头发（头壳钩子：波波头轮廓 + 发尾外翘） -->
      <path class="r-head-shell" d="M120 42
        C74 42 52 74 54 112
        C55 134 51 156 58 169
        C64 178 74 179 80 172
        C78 160 80 150 84 142
        L156 142
        C160 150 162 160 160 172
        C166 179 176 178 182 169
        C189 156 185 134 186 112
        C188 74 166 42 120 42 Z"/>
      <!-- 头发高光 -->
      <ellipse cx="94" cy="62" rx="17" ry="7" transform="rotate(-18 94 62)" fill="#ffffff" opacity="0.85"/>
      <!-- 圆脸（肤色的"屏幕"：脸颊宽、下巴圆润） -->
      <path class="r-face" d="M120 96 C98 96 86 108 86 126 C86 146 100 160 120 160 C140 160 154 146 154 126 C154 108 142 96 120 96 Z"/>
      <!-- 刘海（三撮尖角） -->
      <path d="M84 110 C86 96 100 90 120 90 C140 90 154 96 156 110
        L150 108 L144 119 L136 109 L128 120 L120 110 L112 120 L104 109 L96 119 L90 108 Z"
        style="fill:var(--c-body);stroke:var(--c-body-shade);stroke-width:3;stroke-linejoin:round"/>
      <!-- 两侧发束（垂到下巴） -->
      <path d="M88 106 C82 118 80 138 84 154 C86 161 93 161 95 154 C92 140 92 122 97 108 Z"
        style="fill:var(--c-body);stroke:var(--c-body-shade);stroke-width:2.5"/>
      <path d="M152 106 C158 118 160 138 156 154 C154 161 147 161 145 154 C148 140 148 122 143 108 Z"
        style="fill:var(--c-body);stroke:var(--c-body-shade);stroke-width:2.5"/>
      <!-- 女仆头饰（褶皱发箍） -->
      <path d="M74 58 C74 44 84 38 94 40 C96 32 108 30 114 34 C118 28 130 28 134 34 C140 30 152 32 154 40 C164 38 174 44 174 58 C140 49 108 49 74 58 Z"
            style="fill:#ffffff;stroke:var(--c-body-shade);stroke-width:3;stroke-linejoin:round"/>
      <!-- 机械耳饰 = 状态指示灯（天线钩子组） -->
      <path class="r-antenna-stem" d="M176 118 L183 113"/>
      <circle class="r-antenna-glow" cx="187" cy="108" r="12"/>
      <circle cx="187" cy="108" r="9" style="fill:#ffffff;stroke:var(--c-body-shade);stroke-width:3"/>
      <circle cx="187" cy="108" r="6" style="fill:var(--c-eye)" opacity="0.55"/>
      <circle class="r-antenna-bulb" cx="187" cy="108" r="3.5"/>
      <!-- 蝴蝶结（耳朵钩子） -->
      <path class="r-ear r-ear-left" d="M60 102 L50 95 L52 107 Z M60 102 L70 95 L68 107 Z"/>
      <path class="r-ear r-ear-right" d="M181 90 L172 84 L174 96 Z M181 90 L190 84 L188 96 Z"/>
      <!-- 大眼睛组（眨眼缩放作用于整组：底色+上睫影+高光） -->
      <g class="r-eyes">
        <g class="r-eye-pill r-eye-left">
          <ellipse cx="103" cy="128" rx="8.5" ry="11.5"/>
          <ellipse cx="103" cy="121" rx="8.5" ry="5" fill="#0b3648" opacity="0.5"/>
          <circle cx="99.5" cy="123.5" r="2.8" fill="#ffffff"/>
          <circle cx="106.5" cy="132.5" r="1.5" fill="#ffffff" opacity="0.85"/>
          <path d="M94.5 121 Q103 113 111.5 121" stroke="#1a2b33" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        </g>
        <g class="r-eye-pill r-eye-right">
          <ellipse cx="137" cy="128" rx="8.5" ry="11.5"/>
          <ellipse cx="137" cy="121" rx="8.5" ry="5" fill="#0b3648" opacity="0.5"/>
          <circle cx="133.5" cy="123.5" r="2.8" fill="#ffffff"/>
          <circle cx="140.5" cy="132.5" r="1.5" fill="#ffffff" opacity="0.85"/>
          <path d="M128.5 121 Q137 113 145.5 121" stroke="#1a2b33" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        </g>
        <path class="r-eye-arc r-eye-arc-left" d="M94 128 Q103 118 112 128"/>
        <path class="r-eye-arc r-eye-arc-right" d="M128 128 Q137 118 146 128"/>
        <path class="r-eye-closed r-eye-closed-left" d="M94 127 Q103 133 112 127"/>
        <path class="r-eye-closed r-eye-closed-right" d="M128 127 Q137 133 146 127"/>
        <path class="r-eye-squeeze r-eye-squeeze-left" d="M96 119 L110 128 L96 137"/>
        <path class="r-eye-squeeze r-eye-squeeze-right" d="M144 119 L130 128 L144 137"/>
      </g>
      <path class="r-mouth" d="M112 146 Q120 152 128 146"/>
      <path class="r-mouth-bar" d="M112 147 L128 147"/>
      <ellipse class="r-cheek r-cheek-left" cx="91" cy="142" rx="6" ry="3.5"/>
      <ellipse class="r-cheek r-cheek-right" cx="149" cy="142" rx="6" ry="3.5"/>
    </g>
  </g>
  <!-- 粒子特效层（与默认机器人同结构，位置按女仆几何调整） -->
  <g class="r-fx">
    <circle class="fx-steam s1" cx="62" cy="48" r="7"/>
    <circle class="fx-steam s2" cx="178" cy="48" r="7"/>
    <circle class="fx-steam s3" cx="80" cy="36" r="7"/>
    <circle class="fx-steam s4" cx="160" cy="36" r="7"/>
    <g transform="translate(202,102)"><path class="fx-sweat w1" d="M0 -6 C2.8 -2 4 0.5 4 2.5 A4 4 0 1 1 -4 2.5 C-4 0.5 -2.8 -2 0 -6 Z"/></g>
    <g transform="translate(38,110)"><path class="fx-sweat w2" d="M0 -6 C2.8 -2 4 0.5 4 2.5 A4 4 0 1 1 -4 2.5 C-4 0.5 -2.8 -2 0 -6 Z"/></g>
    <g transform="translate(26,160)"><rect class="fx-speed l1" x="-13" y="-1.5" width="26" height="3" rx="1.5"/></g>
    <g transform="translate(30,190)"><rect class="fx-speed l2" x="-13" y="-1.5" width="26" height="3" rx="1.5"/></g>
    <g transform="translate(214,152)"><rect class="fx-speed l3" x="-13" y="-1.5" width="26" height="3" rx="1.5"/></g>
    <g transform="translate(184,76)"><text class="fx-zzz z1">Z</text></g>
    <g transform="translate(198,56)"><text class="fx-zzz z2">Z</text></g>
    <g transform="translate(212,36)"><text class="fx-zzz z3">Z</text></g>
    <g transform="translate(180,30)">
      <g class="fx-alert">
        <circle class="fx-alert-bg" r="15"/>
        <path class="fx-alert-tail" d="M-9 11 L-3 21 L2 12 Z"/>
        <text class="fx-alert-text" y="5.5">!</text>
      </g>
    </g>
  </g>
  <g class="r-sparkles"></g>
</svg>
